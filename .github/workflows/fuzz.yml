name: Fuzz

on:
  schedule:
    # Run nightly at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      duration:
        description: "Seconds per fuzz target"
        required: false
        default: "20"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_BOOSTRAP: 1

jobs:
  fuzz:
    name: Fuzz all targets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: llvm-tools-preview

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run all fuzz targets
        working-directory: crates/seqair
        run: ./fuzz/run_all.sh ${{ github.event.inputs.duration || '20' }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: fuzzing-artifacts--${{ github.sha }}
          path: crates/seqair/fuzz/artifacts
